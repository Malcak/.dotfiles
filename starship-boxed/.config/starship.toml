"$schema" = 'https://starship.rs/config-schema.json'

palette = 'malcak'

format = """
$os\
$username\
$directory\
$time\
$cmd_duration\
([’æø’ÉŚ’æø](black) $all)\
$line_break\
[ Ōöé](fg:black)\
$line_break\
[ ŌĢ░ŌöĆ](fg:black)\
$character
"""

add_newline = true

[palettes.malcak]
icon_bg = 'black'
text_bg = 'bright-black'
text_fg = 'white'

[username]
show_always = true
style_user = "bg:text_bg fg:text_fg"
# format = '[ @ ]($style bg:icon_bg)[ $user ]($style) '
format = '[ $user ]($style fg:bright-white) '
disabled = false

[directory]
style = "bg:text_bg fg:text_fg"
format = "[ ’ōō ](bg:icon_bg fg:yellow)[ $path ]($style fg:bright-white) "
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[time]
disabled = false
time_format = "%R"
style = "bg:text_bg fg:text_fg"
format = '[ ’Æ½ ]($style bg:icon_bg)[ $time ]($style fg:bright-white) '

[cmd_duration]
min_time = 500
show_milliseconds = true
style = "bg:text_bg fg:text_fg"
format = '[ ¾░öÜ ]($style bg:icon_bg)[ $duration ]($style fg:bright-white) '

[character]
error_symbol = "[Ō¢Č](red)"
success_symbol = "[Ō¢Č](black)"

[git_branch]
symbol = "Ņ½Š"
style = "bg:text_bg fg:text_fg"
format = '[ $symbol ](bg:icon_bg fg:red)[ $branch ]($style) '

[git_status]
style = "bg:text_bg fg:text_fg"
format = '([ Ņ½╝ ](bg:icon_bg fg:red)[ $all_status$ahead_behind ]($style) )'
conflicted = ""
ahead = ">"
behind = "<"
diverged = "<>"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "r"
deleted = "x"

[git_state]
style = "bg:text_bg fg:text_fg"
format = '([ Ņ½Į ](bg:icon_bg fg:red)[ $state( $progress_current/$progress_total) ]($style) )'

