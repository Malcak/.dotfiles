# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$username\
$directory\
$time\
$cmd_duration\
([ΎΣδΎΡΩΎΣδ](black) $all)\
$line_break\
[ έΦΓ](fg:black)\
$line_break\
[ έΧ░έΦΑ](fg:black)\
$character
"""

add_newline = true

[username]
show_always = true
style_user = "bg:bright-black fg:white"
# format = '[ @ ]($style bg:black)[ $user ]($style) '
format = '[ $user ]($style fg:bright-white) '
disabled = false

[directory]
style = "bg:bright-black fg:white"
format = "[ ΎΥΥ ](bg:black fg:yellow)[ $path ]($style fg:bright-white) "
truncation_length = 3
truncation_symbol = "έΑο/"

[time]
disabled = false
time_format = "%R"
style = "bg:bright-black fg:white"
format = '[ ΎΤτ ]($style bg:black)[ $time ]($style fg:bright-white) '

[cmd_duration]
min_time = 500
show_milliseconds = true
style = "bg:bright-black fg:white"
format = '[ ≤░Φγ ]($style bg:black)[ $duration ]($style fg:bright-white) '

[character]
error_symbol = "[έΨ╢](red)"
success_symbol = "[έΨ╢](black)"

[git_branch]
symbol = "ΎΡα"
style = "bg:bright-black fg:white"
format = '[ $symbol ](bg:black fg:red)[ $branch ]($style) '

[git_status]
style = "bg:bright-black fg:white"
format = '([ ≤░Λλ ](bg:black fg:red)[ $all_status$ahead_behind ]($style) )'
ahead = ">"
behind = "<"
diverged = "<>"
renamed = "r"
deleted = "x"

[docker_context]
symbol = "≤░κρ"
style = "bg:bright-black fg:white"
format = '[ $symbol ](bg:black fg:blue)[( $context )]($style) '

[terraform]
symbol = "≤▒Βλ"
style = "bg:bright-black fg:white"
format = '[ $symbol ](bg:black fg:purple)[( $version )]($style)([ $workspace ](bg:black fg:purple bold inverted)) '

[package]
symbol = "≤░ΠΨ"
style = "bg:bright-black fg:white"
format = '[ $symbol ](bg:black fg:#BC9579)[( $version )]($style) '

[python]
symbol = "≤░Νι"
style = "bg:bright-black fg:white"
format = '[ $symbol ](bg:black fg:yellow)[( $version )]($style)([ $virtualenv ](bg:black fg:green bold inverted)) '

[rust]
symbol = "≤▒αΩ"
style = "bg:bright-black fg:white"
format = '[ $symbol ](bg:black fg:#BC9579)[( $version )]($style) '

[lua]
symbol = "≤░λ▒"
style = "bg:bright-black fg:white"
format = '[ $symbol ](bg:black fg:blue)[( $version )]($style) '

[golang]
symbol = "Όαπ"
style = "bg:bright-black fg:white"
format = '[ $symbol ](bg:black fg:blue)[( $version )]($style) '

[vagrant]
disabled = true

[os]
disabled = false
style = "bg:black fg:white"
format = '[ $symbol ]($style)'

